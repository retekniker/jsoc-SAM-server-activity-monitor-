<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>77th JSOC | S.A.M. Tactical Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0f14; color: #00ff9c; font-family: 'JetBrains Mono', monospace; overflow-x: hidden; }
        .soc-border { border: 3px solid #00ff9c; box-shadow: 0 0 15px rgba(0, 255, 156, 0.3); transition: all 0.3s ease; }
        .soc-border-red { border: 3px solid #ff4d4d; box-shadow: 0 0 15px rgba(255, 77, 77, 0.3); }
        .glow-text { text-shadow: 0 0 12px rgba(0, 255, 156, 0.8), 0 0 20px rgba(0, 255, 156, 0.4); }
        
        /* Stylizacja logo pod licznikiem */
        .bottom-logo {
            max-width: 200px;
            width: 100%;
            height: auto;
            margin-top: 20px;
            filter: drop-shadow(0 0 10px rgba(0, 255, 156, 0.3));
            opacity: 0.8;
        }

        @keyframes neon-pulse-red {
            0%, 100% { border-color: #ff4d4d; box-shadow: 0 0 5px #ff4d4d, inset 0 0 5px #ff4d4d; }
            50% { border-color: #ff0000; box-shadow: 0 0 30px #ff0000, inset 0 0 15px #ff0000; }
        }
        .server-full-anim { animation: neon-pulse-red 0.8s infinite; border-color: #ff4d4d !important; }

        @keyframes alert-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .alert-icon { display: none; width: 18px; height: 18px; background-color: #ff4d4d; color: white; border-radius: 50%; text-align: center; line-height: 18px; font-weight: bold; font-size: 10px; margin-left: 8px; animation: alert-blink 0.8s infinite; box-shadow: 0 0 10px #ff4d4d; }

        .lang-btn { border: 1px solid #00ff9c; background: rgba(0, 255, 156, 0.1); color: #00ff9c; font-size: 10px; padding: 2px 8px; transition: all 0.2s; cursor: pointer; }
        .lang-btn:hover, .lang-btn.active { background: #00ff9c; color: #0b0f14; box-shadow: 0 0 10px #00ff9c; }

        .btn-neon-help { border: 2px solid #00ff9c; background: rgba(0, 255, 156, 0.05); color: #00ff9c; box-shadow: 0 0 10px rgba(0, 255, 156, 0.3); transition: all 0.2s ease-in-out; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; }
        .btn-neon-help:hover { background: #00ff9c; color: #0b0f14; box-shadow: 0 0 20px rgba(0, 255, 156, 0.8); transform: scale(1.05); }

        #helpModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #0b0f14; border: 2px solid #00ff9c; box-shadow: 0 0 40px rgba(0, 255, 156, 0.2); max-width: 650px; width: 90%; padding: 2rem; max-height: 85vh; overflow-y: auto; }

        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0b0f14; } ::-webkit-scrollbar-thumb { background: #00ff9c; border-radius: 3px; }
        
        .player-row:hover { background: rgba(0, 255, 156, 0.1); cursor: cell; }
        .watch-highlight { color: #ff4d4d !important; font-weight: bold !important; animation: row-pulse 2s infinite; }
        @keyframes row-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .btn-clear-all { margin-top: 8px; width: 100%; border: 1px solid #ff4d4d; background: rgba(255, 77, 77, 0.1); color: #ff4d4d; font-size: 9px; font-weight: bold; padding: 4px; text-transform: uppercase; transition: all 0.2s; cursor: pointer; }
        .btn-clear-all:hover { background: #ff4d4d; color: #0b0f14; box-shadow: 0 0 10px #ff4d4d; }

        .btn-add-all { border: 2px solid #00ff9c; background: rgba(0, 255, 156, 0.1); color: #00ff9c; font-size: 9px; font-weight: 900; padding: 3px 8px; text-transform: uppercase; transition: all 0.3s; cursor: pointer; margin-left: auto; box-shadow: 0 0 10px rgba(0, 255, 156, 0.4); }
        .alert-btn-top { border: 1px solid #ff4d4d; color: #ff4d4d; font-size: 8px; padding: 2px 8px; font-weight: bold; text-transform: uppercase; transition: all 0.2s; cursor: pointer; }
        .alert-btn-top:hover { background: #ff4d4d; color: #0b0f14; box-shadow: 0 0 10px #ff4d4d; }

        .mute-btn { cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; padding: 4px; border-radius: 4px; }
        .volume-wrapper:hover .volume-panel { display: flex; }
        .vol-level { transition: all 0.15s ease-in-out; }

        .sam-highlight { font-weight: 700; font-size: 1.1em; color: #00ff9c; }
        .sam-rest { font-weight: 400; font-size: 0.9em; opacity: 0.8; color: #00ff9c; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div id="helpModal">
        <div class="modal-content">
            <div class="flex justify-between items-center border-b border-green-900 pb-4 mb-6">
                <h2 id="modalTitle" class="text-xl md:text-2xl font-bold glow-text uppercase tracking-tighter"></h2>
                <button onclick="toggleHelp()" class="text-green-500 hover:text-white text-3xl">&times;</button>
            </div>
            <div id="modalBody" class="space-y-6 text-sm leading-relaxed"></div>
            <button id="modalClose" onclick="toggleHelp()" class="mt-8 w-full py-3 bg-green-900/20 border border-green-500 hover:bg-green-500 hover:text-black transition-all font-bold uppercase text-xs tracking-widest"></button>
        </div>
    </div>

    <div class="flex flex-col md:flex-row justify-between items-center md:items-end mb-8 border-b border-green-900 pb-6 gap-6">
        <div class="flex flex-col md:flex-row items-center gap-6">
            <div class="flex flex-col items-center md:items-start">
                <div class="flex items-center gap-3">
                    <div id="currentTime" class="text-xl font-bold opacity-90 tracking-wider text-green-400"></div>
                    <div class="volume-wrapper relative flex items-center justify-center py-2 -my-2 cursor-pointer z-50">
                        <button onclick="toggleMute()" id="muteBtn" class="mute-btn"><svg id="muteIcon" width="20" height="20" viewBox="0 0 24 24" fill="#00ff9c"></svg></button>
                        <div class="volume-panel absolute bottom-[80%] left-1/2 -translate-x-1/2 mb-2 bg-[#0b0f14] border border-green-900 p-2 rounded hidden flex-col-reverse gap-1.5 shadow-[0_0_15px_rgba(0,0,0,0.8)] z-50">
                            <div class="vol-level w-6 h-1.5 cursor-pointer rounded-sm" data-vol="0.2" onclick="setVolume(0.2)"></div>
                            <div class="vol-level w-6 h-1.5 cursor-pointer rounded-sm" data-vol="0.4" onclick="setVolume(0.4)"></div>
                            <div class="vol-level w-6 h-1.5 cursor-pointer rounded-sm" data-vol="0.6" onclick="setVolume(0.6)"></div>
                            <div class="vol-level w-6 h-1.5 cursor-pointer rounded-sm" data-vol="0.8" onclick="setVolume(0.8)"></div>
                            <div class="vol-level w-6 h-1.5 cursor-pointer rounded-sm" data-vol="1.0" onclick="setVolume(1.0)"></div>
                        </div>
                    </div>
                </div>
                <div id="currentDate" class="text-xs opacity-60 uppercase tracking-widest"></div>
            </div>
            <div class="flex gap-2">
                <button onclick="changeLang('en')" id="btn-en" class="lang-btn">EN</button>
                <button onclick="changeLang('pl')" id="btn-pl" class="lang-btn">PL</button>
                <button onclick="changeLang('se')" id="btn-se" class="lang-btn">SE</button>
            </div>
        </div>

        <div class="text-center md:text-right">
            <div class="flex flex-col md:flex-row items-center justify-end gap-3 md:gap-5 mb-2">
                <button onclick="toggleHelp()" id="manualBtn" class="btn-neon-help text-[10px] font-bold px-4 py-1.5 rounded-sm order-2 md:order-1"></button>
                <h1 class="text-3xl md:text-4xl font-bold glow-text tracking-tighter uppercase mb-0 leading-none order-1 md:order-2">77th JSOC</h1>
            </div>
            <p class="text-lg md:text-xl font-light opacity-80 tracking-[0.2em] md:tracking-[0.3em] mb-0 flex items-baseline justify-center md:justify-end gap-1">
                <span class="sam-highlight glow-text">S</span><span class="sam-rest glow-text">ERVER</span>
                <span class="sam-highlight glow-text">A</span><span class="sam-rest glow-text">CTIVITY</span>
                <span class="sam-highlight glow-text">M</span><span class="sam-rest glow-text">ONITOR</span>
            </p>
        </div>
    </div>

    <div class="flex flex-col lg:flex-row gap-6 items-start w-full">
        <div class="flex flex-col gap-6 w-full lg:w-auto shrink-0">
            <div class="flex flex-col md:flex-row gap-4 w-full">
                <div id="containerEU1" class="soc-border p-4 bg-black/40 w-full md:w-64 shrink-0">
                    <div class="flex items-center mb-3">
                        <h2 class="font-bold text-lg">EU-1</h2>
                        <div id="alertEU1" class="alert-icon">!</div>
                        <button onclick="addAllToWatch('EU1')" class="btn-add-all">ADD ALL</button>
                    </div>
                    <div id="statusEU1" class="text-[10px] px-2 py-0.5 rounded border border-current uppercase w-full text-right mb-3">Loading</div>
                    <div class="grid grid-cols-2 gap-2 text-sm mb-4">
                        <div class="lang-players opacity-70"></div> <div id="playersEU1" class="text-right font-bold">-/-</div>
                        <div class="lang-map opacity-70"></div> <div id="mapEU1" class="text-right truncate text-[11px]">-</div>
                        <div class="lang-ping opacity-70"></div> <div id="pingEU1" class="text-right font-bold">-ms</div>
                    </div>
                    <div id="listEU1" class="h-[400px] md:h-[500px] overflow-y-auto text-xs space-y-1"></div>
                </div>
                <div id="containerEU2" class="soc-border p-4 bg-black/40 w-full md:w-64 shrink-0">
                    <div class="flex items-center mb-3">
                        <h2 class="font-bold text-lg">EU-2</h2>
                        <div id="alertEU2" class="alert-icon">!</div>
                        <button onclick="addAllToWatch('EU2')" class="btn-add-all">ADD ALL</button>
                    </div>
                    <div id="statusEU2" class="text-[10px] px-2 py-0.5 rounded border border-current uppercase w-full text-right mb-3">Loading</div>
                    <div class="grid grid-cols-2 gap-2 text-sm mb-4">
                        <div class="lang-players opacity-70"></div> <div id="playersEU2" class="text-right font-bold">-/-</div>
                        <div class="lang-map opacity-70"></div> <div id="mapEU2" class="text-right truncate text-[11px]">-</div>
                        <div class="lang-ping opacity-70"></div> <div id="pingEU2" class="text-right font-bold">-ms</div>
                    </div>
                    <div id="listEU2" class="h-[400px] md:h-[500px] overflow-y-auto text-xs space-y-1"></div>
                </div>
                <div id="containerEU3" class="soc-border p-4 bg-black/40 w-full md:w-64 shrink-0">
                    <div class="flex items-center mb-3">
                        <h2 class="font-bold text-lg">EU-3</h2>
                        <div id="alertEU3" class="alert-icon">!</div>
                        <button onclick="addAllToWatch('EU3')" class="btn-add-all">ADD ALL</button>
                    </div>
                    <div id="statusEU3" class="text-[10px] px-2 py-0.5 rounded border border-current uppercase w-full text-right mb-3">Loading</div>
                    <div class="grid grid-cols-2 gap-2 text-sm mb-4">
                        <div class="lang-players opacity-70"></div> <div id="playersEU3" class="text-right font-bold">-/-</div>
                        <div class="lang-map opacity-70"></div> <div id="mapEU3" class="text-right truncate text-[11px]">-</div>
                        <div class="lang-ping opacity-70"></div> <div id="pingEU3" class="text-right font-bold">-ms</div>
                    </div>
                    <div id="listEU3" class="h-[400px] md:h-[500px] overflow-y-auto text-xs space-y-1"></div>
                </div>
            </div>
            
            <div class="soc-border p-6 bg-black/60 flex flex-col items-center justify-center w-full">
                <div id="totalLabel" class="text-sm opacity-60 uppercase tracking-[0.4em] mb-2 text-center"></div>
                <div class="text-6xl md:text-8xl font-bold glow-text leading-none" id="totalStat">0</div>
                
                <img src="Adobe Express - file.png" alt="77th JSOC Logo" class="bottom-logo">
            </div>
        </div>

        <div class="flex flex-col gap-6 flex-1 w-full">
            <div class="soc-border p-4 bg-black/40">
                <h3 id="watchlistTitle" class="text-sm font-bold mb-3 uppercase opacity-80"></h3>
                <div class="flex gap-2 mb-4">
                    <input id="watchInput" type="text" placeholder="Nickname..." class="bg-black border border-green-900 text-xs p-2 flex-1 outline-none focus:border-green-400">
                    <button onclick="addWatch()" class="bg-green-900 hover:bg-green-700 text-white text-[10px] px-4 py-1 font-bold">ADD</button>
                </div>
                <div id="watchList" class="text-xs space-y-2 max-h-40 overflow-y-auto"></div>
                <button onclick="clearAllWatch()" id="clearBtn" class="btn-clear-all"></button>
            </div>

            <div class="soc-border-red p-4 bg-red-950/10">
                <div class="flex justify-between items-center mb-3">
                    <h3 id="criticalTitle" class="text-sm font-bold uppercase text-white">Notifications</h3>
                    <button onclick="clearAllAlerts()" class="alert-btn-top">Clear All</button>
                </div>
                <div id="alertBox" class="text-[11px] space-y-1 h-40 overflow-y-auto"></div>
            </div>

            <div class="soc-border p-4 bg-black flex-1 min-h-[300px]">
                <h3 id="trendTitle" class="text-sm font-bold uppercase opacity-80 mb-3"></h3>
                <div class="relative h-[200px] md:h-[250px] w-full"><canvas id="popChart"></canvas></div>
            </div>

            <div class="soc-border p-4 bg-black/40">
                <h3 id="syslogTitle" class="text-sm font-bold mb-2 uppercase opacity-80"></h3>
                <div id="logBox" class="text-[11px] h-32 overflow-y-auto font-mono opacity-80"></div>
            </div>
        </div>
    </div>

    <script>
        const i18n = {
            en: { 
                manual: "SYSTEM MANUAL [?]", totalPop: "Total Population", watchlist: "Priority Watchlist", critical: "Notifications", trend: "Population Trend", syslog: "System Log", players: "Players:", map: "Map:", ping: "Ping:", 
                m_title: "Tactical Monitor Manual", m_close: "Return", 
                m_body: `<div class="space-y-4 text-xs"><div><b class="text-green-400">SERVER STATUS:</b> Monitors EU-1, EU-2, and EU-3. Red pulse indicates server is full.</div><div><b class="text-green-400">WATCHLIST:</b> Track specific players. Double-click any name in the roster or use "ADD ALL" to monitor everyone currently online.</div><div><b class="text-green-400">NOTIFICATIONS:</b> Alerts trigger when a watched player joins or leaves. Click 'X' to dismiss one, or 'Clear All' to wipe the log.</div><div><b class="text-green-400">AUDIO:</b> Beep for joins, Pop for leaves. Volume controls are located next to the system clock.</div></div>`,
                sync: "Sync complete", added: "Added:", online: "ONLINE", full: "SERVER FULL", offline: "OFFLINE", joined: "JOINED", left: "LEFT", clear: "Clear Watchlist", cleared: "Watchlist cleared" 
            },
            pl: { 
                manual: "MANUAL SYSTEMU [?]", totalPop: "Całkowita Populacja", watchlist: "Lista Priorytetowa", critical: "Powiadomienia", trend: "Trend Populacji", syslog: "Log Systemowy", players: "Gracze:", map: "Mapa:", ping: "Ping:", 
                m_title: "Instrukcja Monitora", m_close: "Powrót", 
                m_body: `<div class="space-y-4 text-xs"><div><b class="text-green-400">STATUS SERWERÓW:</b> Monitoruje EU-1, EU-2 i EU-3. Czerwony puls oznacza pełny serwer.</div><div><b class="text-green-400">OBSERWOWANI:</b> Śledź wybranych graczy. Kliknij 2x na nick na liście lub użyj "DODAJ WSZ.", by obserwować wszystkich obecnych.</div><div><b class="text-green-400">POWIADOMIENIA:</b> Alerty pojawiają się gdy gracz wejdzie lub wyjdzie. Kliknij 'X' by usunąć wpis lub 'Clear All' by wyczyścić wszystko.</div><div><b class="text-green-400">AUDIO:</b> Sygnał przy wejściu i wyjściu. Kontrola głośności znajduje się przy zegarze systemowym.</div></div>`,
                sync: "Synchronizacja OK", added: "Dodano:", online: "ONLINE", full: "SERWER PEŁNY", offline: "OFFLINE", joined: "WSZEDŁ", left: "OPUŚCIŁ", clear: "Wyczyść listę", cleared: "Lista wyczyszczona" 
            },
            se: { 
                manual: "SYSTEM MANUAL [?]", totalPop: "Total Population", watchlist: "Prioritetslista", critical: "Notiser", trend: "Populationstrend", syslog: "Systemlogg", players: "Spelare:", map: "Karta:", ping: "Ping:", 
                m_title: "Monitor Manual", m_close: "Tillbaka", 
                m_body: `<div class="space-y-4 text-xs"><div><b class="text-green-400">SERVERSTATUS:</b> Övervakar EU-1, EU-2 och EU-3. Röd puls indikerar full server.</div><div><b class="text-green-400">PRIORITETSLISTA:</b> Spåra specifika spelare. Dubbelklicka på namn eller använd "ADD ALL" för att lägga till alla online.</div><div><b class="text-green-400">NOTISER:</b> Aviseringar när spelare ansluter/lämnar. Klicka på 'X' för att ta bort en notis.</div><div><b class="text-green-400">LJUD:</b> Beep vid anslutning, Pop vid lämna. Volymkontroll finns bredvid klockan.</div></div>`,
                sync: "Synk klar", added: "Tillagd:", online: "ONLINE", full: "SERVER FULL", offline: "OFFLINE", joined: "ANSLÖT", left: "LÄMNADE", clear: "Rensa listan", cleared: "Listan rensad" 
            }
        };

        let currentLang = localStorage.getItem('jsoc_lang') || 'en';
        let isMuted = localStorage.getItem('jsoc_muted') === 'true';
        let currentVolume = parseFloat(localStorage.getItem('jsoc_volume')) || 1.0;
        const SERVERS = { EU1: "14808491", EU2: "30137964", EU3: "28825461" };
        let WATCH = JSON.parse(localStorage.getItem('jsoc_watch')) || [];
        let previous = { EU1: [], EU2: [], EU3: [] };
        let cache = {}; let historyData = []; let historyLabels = []; let isFirstLoad = true;
        const soundJoin = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
        const soundLeave = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");

        function playAudioFile(audioObj) { if(!isMuted) { const clone = audioObj.cloneNode(); clone.volume = currentVolume; clone.play().catch(()=>{}); } }
        function setVolume(level) { currentVolume = level; localStorage.setItem('jsoc_volume', level); updateVolumeUI(); }
        function updateVolumeUI() { document.querySelectorAll('.vol-level').forEach(el => { const vol = parseFloat(el.getAttribute('data-vol')); el.className = vol <= currentVolume ? "vol-level w-6 h-1.5 cursor-pointer rounded-sm bg-green-400 shadow-[0_0_8px_#00ff9c]" : "vol-level w-6 h-1.5 cursor-pointer rounded-sm bg-green-900/40"; }); }
        function toggleMute() { isMuted = !isMuted; localStorage.setItem('jsoc_muted', isMuted); updateMuteUI(); }
        function updateMuteUI() {
            const icon = document.getElementById('muteIcon');
            icon.innerHTML = isMuted ? '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.41.32-.85.59-1.32.76v2.06c1.02-.21 1.97-.64 2.8-1.25L19.73 21 21 19.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>' : '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
        }

        function changeLang(lang) { currentLang = lang; localStorage.setItem('jsoc_lang', lang); applyLang(); }
        function applyLang() {
            const t = i18n[currentLang];
            document.getElementById('manualBtn').innerText = t.manual; document.getElementById('totalLabel').innerText = t.totalPop; document.getElementById('watchlistTitle').innerText = t.watchlist;
            document.getElementById('criticalTitle').innerText = t.critical; document.getElementById('trendTitle').innerText = t.trend; document.getElementById('syslogTitle').innerText = t.syslog;
            document.getElementById('clearBtn').innerText = t.clear; document.getElementById('modalTitle').innerText = t.m_title; document.getElementById('modalBody').innerHTML = t.m_body;
            document.getElementById('modalClose').innerText = t.m_close;
            document.querySelectorAll('.lang-players').forEach(el => el.innerText = t.players); document.querySelectorAll('.lang-map').forEach(el => el.innerText = t.map);
            document.querySelectorAll('.lang-ping').forEach(el => el.innerText = t.ping);
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active')); document.getElementById(`btn-${currentLang}`).classList.add('active');
        }

        function addAlert(text) {
            const box = document.getElementById("alertBox");
            const div = document.createElement("div");
            div.className = "flex justify-between items-center mb-1 border-l-2 border-green-500 pl-2 bg-black/20";
            div.innerHTML = `<div class="text-green-400 font-bold"><span class="opacity-50 font-normal">[${new Date().toLocaleTimeString()}]</span> ${text}</div><span class="cursor-pointer text-white hover:text-red-500 px-2 font-bold" onclick="this.parentElement.remove()">✖</span>`;
            box.insertBefore(div, box.firstChild);
        }
        function clearAllAlerts() { document.getElementById("alertBox").innerHTML = ""; }

        function renderWatchList() {
            const div = document.getElementById("watchList"); div.innerHTML = "";
            WATCH.forEach(nick => {
                const item = document.createElement("div"); item.className = "flex justify-between items-center bg-green-900/20 p-1 px-2 rounded";
                item.innerHTML = `<span>${nick}</span><span class="cursor-pointer hover:text-white" onclick="removeWatch('${nick}')">✖</span>`;
                div.appendChild(item);
            });
            localStorage.setItem('jsoc_watch', JSON.stringify(WATCH));
        }
        function addWatch(val) {
            const input = document.getElementById("watchInput"); const nick = (val || input.value).trim();
            if (nick && !WATCH.some(w => w.toLowerCase() === nick.toLowerCase())) { WATCH.push(nick); renderWatchList(); logEvent(`${i18n[currentLang].added} ${nick}`, "text-blue-400"); }
            input.value = "";
        }
        function removeWatch(nick) { WATCH = WATCH.filter(x => x !== nick); renderWatchList(); }
        function clearAllWatch() { WATCH = []; renderWatchList(); logEvent(i18n[currentLang].cleared, "text-red-400"); }

        function addAllToWatch(serverName) {
            const serverData = cache[serverName]; if (!serverData || !serverData.list) return;
            serverData.list.forEach(p => { if (!isPlayerWatched(p.name)) WATCH.push(p.name); });
            renderWatchList(); playAudioFile(soundJoin);
        }

        async function fetchServer(name, id) {
            try {
                const start = performance.now();
                const res = await fetch(`https://api.battlemetrics.com/servers/${id}?include=player`);
                const json = await res.json();
                const attr = json.data.attributes;
                let players = (json.included || []).filter(x => x.type === "player").map(p => ({ name: p.attributes.name }));
                const currentNames = players.map(p => p.name);
                if (!isFirstLoad) {
                    currentNames.filter(p => !previous[name].includes(p)).forEach(pName => { if (isPlayerWatched(pName)) { playAudioFile(soundJoin); addAlert(`${pName} ${i18n[currentLang].joined} ${name}`); } });
                    previous[name].filter(p => !currentNames.includes(p)).forEach(pName => { if (isPlayerWatched(pName)) { playAudioFile(soundLeave); addAlert(`${pName} ${i18n[currentLang].left} ${name}`); } });
                }
                previous[name] = currentNames;
                cache[name] = { ...attr, list: players, ping: Math.round(performance.now() - start) };
            } catch (err) {}
        }

        async function updateAll() {
            await Promise.all([fetchServer("EU1", SERVERS.EU1), fetchServer("EU2", SERVERS.EU2), fetchServer("EU3", SERVERS.EU3)]);
            let total = 0; ["EU1", "EU2", "EU3"].forEach(n => total += cache[n]?.players || 0);
            const timeLabel = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            historyData.push(total); historyLabels.push(timeLabel);
            if (historyData.length > 60) { historyData.shift(); historyLabels.shift(); }
            chart.data.labels = historyLabels; chart.data.datasets[0].data = historyData; chart.update('none');
            document.getElementById("totalStat").innerText = total;
            isFirstLoad = false; logEvent(i18n[currentLang].sync);
        }

        function renderUI() {
            ["EU1", "EU2", "EU3"].forEach(name => {
                const c = cache[name]; if (!c) return;
                const sEl = document.getElementById(`status${name}`);
                const container = document.getElementById(`container${name}`);
                if (c.status === 'online') {
                    const isFull = c.players >= c.maxPlayers;
                    sEl.innerText = isFull ? i18n[currentLang].full : i18n[currentLang].online;
                    sEl.className = isFull ? "text-[10px] px-2 py-0.5 rounded border border-red-500 text-red-500 font-bold text-right w-full" : "text-[10px] px-2 py-0.5 rounded border border-green-500 text-green-500 text-right w-full";
                    isFull ? container.classList.add('server-full-anim') : container.classList.remove('server-full-anim');
                } else { sEl.innerText = i18n[currentLang].offline; sEl.className = "text-[10px] px-2 py-0.5 rounded border border-red-500 text-red-500 text-right w-full"; }
                document.getElementById(`players${name}`).innerText = `${c.players || 0}/${c.maxPlayers || 0}`;
                document.getElementById(`map${name}`).innerText = c.details?.map || "Altis";
                document.getElementById(`ping${name}`).innerText = `${c.ping}ms`;
                document.getElementById(`alert${name}`).style.display = c.list?.some(p => isPlayerWatched(p.name)) ? 'block' : 'none';
                const listEl = document.getElementById(`list${name}`); listEl.innerHTML = "";
                c.list?.forEach((p, i) => {
                    const row = document.createElement("div"); row.className = `player-row py-0.5 px-1 ${isPlayerWatched(p.name) ? 'watch-highlight' : ''}`;
                    row.innerHTML = `<span>${i+1}. ${p.name}</span>`; row.ondblclick = () => addWatch(p.name); listEl.appendChild(row);
                });
            });
        }

        let chart;
        function initChart() {
            const ctx = document.getElementById('popChart').getContext('2d');
            chart = new Chart(ctx, { type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#00ff9c', backgroundColor: 'rgba(0, 255, 156, 0.05)', fill: true, tension: 0.4, pointRadius: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { display: false } },
                    scales: { x: { grid: { color: '#004400' }, ticks: { color: '#00ff9c', font: { size: 9 } } }, y: { beginAtZero: true, grid: { color: '#004400' }, ticks: { color: '#00ff9c', font: { size: 10 } } } } }
            });
        }
        function logEvent(text, color = "text-green-500") { const log = document.getElementById("logBox"); log.innerHTML = `<div class="${color}">[${new Date().toLocaleTimeString()}] ${text}</div>` + log.innerHTML; if (log.children.length > 30) log.removeChild(log.lastChild); }
        function isPlayerWatched(name) { return name && WATCH.some(w => w.toLowerCase() === name.toLowerCase()); }
        function toggleHelp() { const m = document.getElementById('helpModal'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function updateClock() { document.getElementById('currentTime').innerText = new Date().toLocaleTimeString(); document.getElementById('currentDate').innerText = new Date().toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }); }

        (async function init() {
            applyLang(); initChart(); renderWatchList(); updateMuteUI(); updateVolumeUI(); setInterval(updateClock, 1000);
            await updateAll(); renderUI(); setInterval(updateAll, 4000); setInterval(renderUI, 1000);
        })();
    </script>
</body>
</html>
