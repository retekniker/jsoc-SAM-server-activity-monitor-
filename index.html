<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>77th JSOC | Server Activity Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0f14; color: #00ff9c; font-family: 'JetBrains Mono', monospace; }
        .soc-border { border: 3px solid #00ff9c; box-shadow: 0 0 15px rgba(0, 255, 156, 0.3); }
        .soc-border-red { border: 3px solid #ff4d4d; box-shadow: 0 0 15px rgba(255, 77, 77, 0.3); }
        .glow-text { text-shadow: 0 0 12px rgba(0, 255, 156, 0.8), 0 0 20px rgba(0, 255, 156, 0.4); }
        .glow-text-red { text-shadow: 0 0 12px rgba(255, 77, 77, 0.8); }

        /* PRZYCISKI JĘZYKÓW */
        .lang-btn {
            border: 1px solid #00ff9c;
            background: rgba(0, 255, 156, 0.1);
            color: #00ff9c;
            font-size: 10px;
            padding: 2px 8px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .lang-btn:hover, .lang-btn.active {
            background: #00ff9c;
            color: #0b0f14;
            box-shadow: 0 0 10px #00ff9c;
        }

        .btn-neon-help {
            border: 2px solid #00ff9c;
            background: rgba(0, 255, 156, 0.05);
            color: #00ff9c;
            box-shadow: 0 0 10px rgba(0, 255, 156, 0.3), inset 0 0 5px rgba(0, 255, 156, 0.2);
            transition: all 0.2s ease-in-out;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            animation: help-pulse 2s infinite;
        }
        .btn-neon-help:hover {
            background: #00ff9c; color: #0b0f14;
            box-shadow: 0 0 20px rgba(0, 255, 156, 0.8);
            transform: scale(1.05);
        }
        @keyframes help-pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 255, 156, 0.3); }
            50% { box-shadow: 0 0 20px rgba(0, 255, 156, 0.6); }
        }

        #helpModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #0b0f14; border: 2px solid #00ff9c; box-shadow: 0 0 40px rgba(0, 255, 156, 0.2);
            max-width: 650px; width: 90%; padding: 2.5rem; max-height: 85vh; overflow-y: auto;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b0f14; }
        ::-webkit-scrollbar-thumb { background: #00ff9c; border-radius: 3px; }
        
        .player-row:hover { background: rgba(0, 255, 156, 0.1); cursor: cell; }
        .watch-highlight { color: #ff4d4d !important; font-weight: bold !important; animation: row-pulse 2s infinite; }
        
        @keyframes row-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .alert-icon {
            display: none; width: 18px; height: 18px; background-color: #ff4d4d; color: white;
            border-radius: 50%; text-align: center; line-height: 18px; font-weight: bold;
            font-size: 12px; margin-left: 8px; animation: alert-blink 0.8s infinite;
            box-shadow: 0 0 10px #ff4d4d;
        }
        @keyframes alert-blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.2); } }
    </style>
</head>
<body class="p-4 overflow-x-hidden">

    <div id="helpModal">
        <div class="modal-content">
            <div class="flex justify-between items-center border-b border-green-900 pb-4 mb-6">
                <h2 id="modalTitle" class="text-2xl font-bold glow-text uppercase tracking-tighter"></h2>
                <button onclick="toggleHelp()" class="text-green-500 hover:text-white text-3xl">&times;</button>
            </div>
            <div id="modalBody" class="space-y-6 text-sm leading-relaxed"></div>
            <button id="modalClose" onclick="toggleHelp()" class="mt-8 w-full py-3 bg-green-900/20 border border-green-500 hover:bg-green-500 hover:text-black transition-all font-bold uppercase text-xs tracking-widest"></button>
        </div>
    </div>

    <div class="flex justify-between items-end mb-8 border-b border-green-900 pb-6">
        <div class="flex items-center gap-6">
            <div class="flex flex-col">
                <div id="currentTime" class="text-xl font-bold opacity-90 tracking-wider text-green-400"></div>
                <div id="currentDate" class="text-sm opacity-60 uppercase tracking-widest"></div>
            </div>
            <div class="flex gap-2">
                <button onclick="changeLang('en')" id="btn-en" class="lang-btn">EN</button>
                <button onclick="changeLang('pl')" id="btn-pl" class="lang-btn">PL</button>
                <button onclick="changeLang('se')" id="btn-se" class="lang-btn">SE</button>
            </div>
        </div>

        <div class="text-right pr-4">
            <div class="flex items-center justify-end gap-5 mb-2">
                <button onclick="toggleHelp()" id="manualBtn" class="btn-neon-help text-[10px] font-bold px-4 py-1.5 rounded-sm"></button>
                <h1 class="text-4xl font-bold glow-text tracking-tighter uppercase mb-0 leading-none">
                    77th JSOC
                </h1>
            </div>
            <p class="text-xl font-light opacity-80 tracking-[0.3em] text-green-300 mb-0">
                SERVER ACTIVITY MONITOR
            </p>
            <div class="text-[10px] opacity-30 uppercase tracking-[0.4em] mt-1">
                by Komputer
            </div>
        </div>
    </div>

    <div class="flex flex-row gap-6 items-start">
        <div class="flex flex-col gap-6 shrink-0">
            <div class="flex flex-row gap-4">
                <div class="soc-border p-4 bg-black/40 w-64 relative overflow-hidden">
                    <div class="flex items-center mb-3">
                        <h2 class="font-bold text-lg">EU-1</h2>
                        <div id="alertEU1" class="alert-icon">!</div>
                    </div>
                    <div id="statusEU1" class="text-[10px] px-2 py-0.5 rounded border border-current uppercase w-full text-right mb-3">Loading</div>
                    <div class="grid grid-cols-2 gap-2 text-sm mb-4">
                        <div class="lang-players opacity-70"></div> <div id="playersEU1" class="text-right font-bold">-/-</div>
                        <div class="lang-map opacity-70"></div> <div id="mapEU1" class="text-right truncate text-[11px]">-</div>
                        <div class="lang-ping opacity-70"></div> <div id="pingEU1" class="text-right font-bold">-ms</div>
                    </div>
                    <div class="lang-roster text-[10px] uppercase opacity-50 mb-2 border-t border-green-900 pt-2 text-center"></div>
                    <div id="listEU1" class="h-[550px] overflow-y-auto text-xs space-y-1"></div>
                </div>
                <div class="soc-border p-4 bg-black/40 w-64 relative overflow-hidden">
                    <div class="flex items-center mb-3">
                        <h2 class="font-bold text-lg">EU-2</h2>
                        <div id="alertEU2" class="alert-icon">!</div>
                    </div>
                    <div id="statusEU2" class="text-[10px] px-2 py-0.5 rounded border border-current uppercase w-full text-right mb-3">Loading</div>
                    <div class="grid grid-cols-2 gap-2 text-sm mb-4">
                        <div class="lang-players opacity-70"></div> <div id="playersEU2" class="text-right font-bold">-/-</div>
                        <div class="lang-map opacity-70"></div> <div id="mapEU2" class="text-right truncate text-[11px]">-</div>
                        <div class="lang-ping opacity-70"></div> <div id="pingEU2" class="text-right font-bold">-ms</div>
                    </div>
                    <div class="lang-roster text-[10px] uppercase opacity-50 mb-2 border-t border-green-900 pt-2 text-center"></div>
                    <div id="listEU2" class="h-[550px] overflow-y-auto text-xs space-y-1"></div>
                </div>
                <div class="soc-border p-4 bg-black/40 w-64 relative overflow-hidden">
                    <div class="flex items-center mb-3">
                        <h2 class="font-bold text-lg">EU-3</h2>
                        <div id="alertEU3" class="alert-icon">!</div>
                    </div>
                    <div id="statusEU3" class="text-[10px] px-2 py-0.5 rounded border border-current uppercase w-full text-right mb-3">Loading</div>
                    <div class="grid grid-cols-2 gap-2 text-sm mb-4">
                        <div class="lang-players opacity-70"></div> <div id="playersEU3" class="text-right font-bold">-/-</div>
                        <div class="lang-map opacity-70"></div> <div id="mapEU3" class="text-right truncate text-[11px]">-</div>
                        <div class="lang-ping opacity-70"></div> <div id="pingEU3" class="text-right font-bold">-ms</div>
                    </div>
                    <div class="lang-roster text-[10px] uppercase opacity-50 mb-2 border-t border-green-900 pt-2 text-center"></div>
                    <div id="listEU3" class="h-[550px] overflow-y-auto text-xs space-y-1"></div>
                </div>
            </div>

            <div class="soc-border p-6 bg-black/60 flex flex-col items-center justify-center">
                <div id="totalLabel" class="text-sm opacity-60 uppercase tracking-[0.4em] mb-2"></div>
                <div class="text-8xl font-bold glow-text leading-none" id="totalStat">0</div>
            </div>
        </div>

        <div class="flex flex-col gap-6 flex-1 w-full">
            <div class="soc-border p-4 bg-black/40">
                <h3 id="watchlistTitle" class="text-sm font-bold mb-3 uppercase opacity-80"></h3>
                <div class="flex gap-2 mb-4">
                    <input id="watchInput" type="text" placeholder="Nickname..." class="bg-black border border-green-900 text-xs p-1 flex-1 outline-none focus:border-green-400">
                    <button onclick="addWatch()" id="addBtn" class="bg-green-900 hover:bg-green-700 text-white text-[10px] px-3 py-1 transition-all">ADD</button>
                </div>
                <div id="watchList" class="text-xs space-y-2 max-h-40 overflow-y-auto"></div>
            </div>

            <div class="soc-border-red p-4 bg-red-950/10">
                <h3 id="criticalTitle" class="text-sm font-bold mb-3 uppercase opacity-80 text-red-500 glow-text-red"></h3>
                <div id="alertBox" class="text-[11px] space-y-1 h-40 overflow-y-auto"></div>
            </div>

            <div class="soc-border p-4 bg-black flex-1 min-h-[220px]">
                <div class="flex justify-between items-center mb-3">
                    <h3 id="trendTitle" class="text-sm font-bold uppercase opacity-80"></h3>
                    <div class="text-xs bg-green-900/30 px-2 py-0.5 rounded border border-green-500/30">
                        Live: <span id="trendTotal" class="font-bold">0</span>
                    </div>
                </div>
                <div class="h-44">
                    <canvas id="popChart"></canvas>
                </div>
            </div>

            <div class="soc-border p-4 bg-black/40">
                <h3 id="syslogTitle" class="text-sm font-bold mb-2 uppercase opacity-80"></h3>
                <div id="logBox" class="text-[11px] h-32 overflow-y-auto font-mono opacity-80"></div>
            </div>
        </div>
    </div>

    <script>
        const i18n = {
            en: {
                manual: "SYSTEM MANUAL [?]",
                totalPop: "Total JSOC Population",
                watchlist: "Priority Watchlist",
                critical: "Critical Alerts",
                trend: "Population Trend",
                syslog: "System Log",
                players: "Players:",
                map: "Map:",
                ping: "Ping:",
                roster: "Roster (Dbl-Click)",
                m_title: "System Operations Manual",
                m_close: "Return to Monitor",
                m_body: `
                    <div class="border-l-2 border-green-500 pl-4"><strong>1. Live Monitoring</strong><p class="opacity-70">Data is fetched every 8 seconds.</p></div>
                    <div class="border-l-2 border-green-500 pl-4"><strong>2. Watchlist</strong><p class="opacity-70">Triggers audio/visual alerts when watched players join.</p></div>
                    <div class="border-l-2 border-green-500 pl-4"><strong>3. Shortcuts</strong><p class="opacity-70">Double-click names on roster to add to watchlist.</p></div>`,
                sync: "Data sync complete",
                added: "Added to Watchlist:",
                online: "is ONLINE on",
                joined: "JOINED",
                left: "LEFT"
            },
            pl: {
                manual: "MANUAL SYSTEMU [?]",
                totalPop: "Całkowita Populacja JSOC",
                watchlist: "Lista Priorytetowa",
                critical: "Alerty Krytyczne",
                trend: "Trend Populacji",
                syslog: "Log Systemowy",
                players: "Gracze:",
                map: "Mapa:",
                ping: "Ping:",
                roster: "Lista (Dbl-Click)",
                m_title: "Instrukcja Operacyjna Systemu",
                m_close: "Powrót do Monitora",
                m_body: `
                    <div class="border-l-2 border-green-500 pl-4"><strong>1. Monitoring na Żywo</strong><p class="opacity-70">Dane pobierane co 8 sekund.</p></div>
                    <div class="border-l-2 border-green-500 pl-4"><strong>2. Lista Obserwowanych</strong><p class="opacity-70">Uruchamia alerty gdy gracz wejdzie na serwer.</p></div>
                    <div class="border-l-2 border-green-500 pl-4"><strong>3. Skróty</strong><p class="opacity-70">Kliknij dwukrotnie nick na liście, aby dodać do obserwacji.</p></div>`,
                sync: "Synchronizacja danych zakończona",
                added: "Dodano do listy:",
                online: "jest ONLINE na",
                joined: "WSZEDŁ NA",
                left: "OPUŚCIŁ"
            },
            se: {
                manual: "SYSTEM MANUAL [?]",
                totalPop: "Total JSOC Population",
                watchlist: "Prioritetslista",
                critical: "Kritiska Varningar",
                trend: "Populationstrend",
                syslog: "Systemlogg",
                players: "Spelare:",
                map: "Karta:",
                ping: "Ping:",
                roster: "Lista (Dubbelklicka)",
                m_title: "Systemets Manual",
                m_close: "Tillbaka till Monitorn",
                m_body: `
                    <div class="border-l-2 border-green-500 pl-4"><strong>1. Live-övervakning</strong><p class="opacity-70">Data hämtas var 8:e sekund.</p></div>
                    <div class="border-l-2 border-green-500 pl-4"><strong>2. Bevakningslista</strong><p class="opacity-70">Utlöser varningar när bevakade spelare ansluter.</p></div>
                    <div class="border-l-2 border-green-500 pl-4"><strong>3. Genvägar</strong><p class="opacity-70">Dubbelklicka på namn för att lägga till i listan.</p></div>`,
                sync: "Datasynkronisering klar",
                added: "Tillagd i listan:",
                online: "är ONLINE på",
                joined: "ANSLÖT TILL",
                left: "LÄMNADE"
            }
        };

        let currentLang = localStorage.getItem('jsoc_lang') || 'en';

        function changeLang(lang) {
            currentLang = lang;
            localStorage.setItem('jsoc_lang', lang);
            applyLang();
        }

        function applyLang() {
            const t = i18n[currentLang];
            document.getElementById('manualBtn').innerText = t.manual;
            document.getElementById('totalLabel').innerText = t.totalPop;
            document.getElementById('watchlistTitle').innerText = t.watchlist;
            document.getElementById('criticalTitle').innerText = t.critical;
            document.getElementById('trendTitle').innerText = t.trend;
            document.getElementById('syslogTitle').innerText = t.syslog;
            document.querySelectorAll('.lang-players').forEach(el => el.innerText = t.players);
            document.querySelectorAll('.lang-map').forEach(el => el.innerText = t.map);
            document.querySelectorAll('.lang-ping').forEach(el => el.innerText = t.ping);
            document.querySelectorAll('.lang-roster').forEach(el => el.innerText = t.roster);
            document.getElementById('modalTitle').innerText = t.m_title;
            document.getElementById('modalBody').innerHTML = t.m_body;
            document.getElementById('modalClose').innerText = t.m_close;

            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${currentLang}`).classList.add('active');
            updateClock(); 
        }

        const SERVERS = { EU1: "14808491", EU2: "28825461", EU3: "30137964" };
        let WATCH = JSON.parse(localStorage.getItem('jsoc_watch')) || [];
        let previous = { EU1: [], EU2: [], EU3: [] };
        let sessions = {};
        let historyData = [];
        let historyLabels = [];
        let cache = {};
        let isFirstLoad = true;
        const FETCH_INTERVAL = 8000;
        let lastFetchTime = 0;
        const alarmAudio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

        function toggleHelp() {
            const modal = document.getElementById('helpModal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        function isPlayerWatched(name) { return name && WATCH.some(w => w.toLowerCase() === name.toLowerCase()); }
        function formatTime(ms) { const s = Math.floor(ms/1000); return `${Math.floor(s/60)}m ${s % 60}s`; }
        function alertSound() { alarmAudio.currentTime = 0; alarmAudio.play().catch(()=>{}); }

        function logEvent(text, color = "text-green-500") {
            const log = document.getElementById("logBox");
            log.innerHTML = `<div class="${color}">[${new Date().toLocaleTimeString()}] ${text}</div>` + log.innerHTML;
            if (log.children.length > 50) log.removeChild(log.lastChild);
        }

        function addAlert(text, type = 'leave') {
            const box = document.getElementById("alertBox");
            const colorClass = type === 'join' ? 'text-green-400 border-green-500' : 'text-red-400 border-red-500';
            box.innerHTML = `<div class="mb-1 border-l-2 pl-2 ${colorClass} font-bold"><span class="opacity-50 font-normal">[${new Date().toLocaleTimeString()}]</span> ${text}</div>` + box.innerHTML;
            if (box.children.length > 20) box.removeChild(box.lastChild);
        }

        function updateClock() { 
            const locales = { en: 'en-GB', pl: 'pl-PL', se: 'sv-SE' };
            const now = new Date();
            document.getElementById('currentTime').innerText = now.toLocaleTimeString(locales[currentLang], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('currentDate').innerText = now.toLocaleDateString(locales[currentLang], { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateClock, 1000);

        function renderWatchList() {
            const div = document.getElementById("watchList");
            div.innerHTML = WATCH.map(nick => `<div class="flex justify-between items-center bg-green-900/20 p-1 px-2 rounded"><span>${nick}</span><span class="cursor-pointer hover:text-white" onclick="removeWatch('${nick}')">✖</span></div>`).join("");
            localStorage.setItem('jsoc_watch', JSON.stringify(WATCH));
        }

        function addWatch(val) {
            const input = document.getElementById("watchInput");
            const nick = (val || input.value).trim();
            if (nick && !WATCH.some(w => w.toLowerCase() === nick.toLowerCase())) {
                WATCH.push(nick); renderWatchList();
                logEvent(`${i18n[currentLang].added} ${nick}`, "text-blue-400");
            }
            input.value = "";
        }

        function removeWatch(nick) { WATCH = WATCH.filter(x => x !== nick); renderWatchList(); }

        async function fetchServer(name, id) {
            const start = performance.now();
            try {
                const res = await fetch(`https://api.battlemetrics.com/servers/${id}?include=player`);
                const json = await res.json();
                const attr = json.data.attributes;
                let players = (json.included || []).filter(x => x.type === "player").map(p => ({ name: p.attributes.name }));
                const currentNames = players.map(p => p.name);

                currentNames.filter(p => !previous[name].includes(p)).forEach(pName => {
                    sessions[pName] = Date.now();
                    if (!isFirstLoad && isPlayerWatched(pName)) { alertSound(); addAlert(`${pName} ${i18n[currentLang].joined} ${name}`, 'join'); }
                });
                previous[name].filter(p => !currentNames.includes(p)).forEach(pName => {
                    if (!isFirstLoad && isPlayerWatched(pName)) { addAlert(`${pName} ${i18n[currentLang].left} ${name}`, 'leave'); }
                });
                previous[name] = currentNames;
                cache[name] = { ...attr, list: players, ping: Math.round(performance.now() - start) };
            } catch (err) {}
        }

        async function updateAllServers() {
            await Promise.all([fetchServer("EU1", SERVERS.EU1), fetchServer("EU2", SERVERS.EU2), fetchServer("EU3", SERVERS.EU3)]);
            let total = 0; ["EU1", "EU2", "EU3"].forEach(n => total += cache[n]?.players || 0);
            const now = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            historyData.push(total); historyLabels.push(now);
            if (historyData.length > 60) { historyData.shift(); historyLabels.shift(); }
            chart.data.labels = historyLabels; chart.data.datasets[0].data = historyData; chart.update('none');
            document.getElementById("totalStat").innerText = total;
            document.getElementById("trendTotal").innerText = total;
            isFirstLoad = false;
            logEvent(i18n[currentLang].sync);
        }

        function renderUI() {
            ["EU1", "EU2", "EU3"].forEach(name => {
                const c = cache[name]; if (!c) return;
                const sEl = document.getElementById(`status${name}`);
                sEl.innerText = (c.status || "offline").toUpperCase();
                sEl.className = `text-[10px] px-2 py-0.5 rounded border w-full text-right ${c.status === 'online' ? 'border-green-500 text-green-500' : 'border-red-500 text-red-500'}`;
                document.getElementById(`players${name}`).innerText = `${c.players || 0}/${c.maxPlayers || 0}`;
                document.getElementById(`map${name}`).innerText = c.map || "Altis";
                document.getElementById(`ping${name}`).innerText = `${c.ping || 0}ms`;
                document.getElementById(`alert${name}`).style.display = c.list?.some(p => isPlayerWatched(p.name)) ? 'block' : 'none';
                if (c.list) {
                    document.getElementById(`list${name}`).innerHTML = c.list.map((p, i) => `
                        <div class="player-row flex justify-between py-0.5 px-1 ${isPlayerWatched(p.name) ? 'watch-highlight' : ''}" 
                             ondblclick="addWatch('${p.name.replace(/'/g, "\\'")}')">
                            <span>${i+1}. ${p.name}</span>
                        </div>`).join("");
                }
            });
        }

        let chart;
        function initChart() {
            const ctx = document.getElementById('popChart').getContext('2d');
            const oscilloscopePlugin = {
                id: 'oscilloscopeBackground',
                beforeDraw: (chart) => {
                    const { ctx, chartArea: { top, bottom, left, right, width, height } } = chart;
                    ctx.save(); ctx.fillStyle = '#000000'; ctx.fillRect(left, top, width, height);
                    ctx.lineWidth = 1; ctx.strokeStyle = '#004400'; 
                    for (let i = 0; i <= 10; i++) {
                        const x = left + (width / 10) * i;
                        ctx.beginPath(); ctx.moveTo(x, top); ctx.lineTo(x, bottom); ctx.stroke();
                    }
                    for (let i = 0; i <= 5; i++) {
                        const y = top + (height / 5) * i;
                        ctx.beginPath(); ctx.moveTo(left, y); ctx.lineTo(right, y); ctx.stroke();
                    }
                    ctx.restore();
                }
            };
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: '#00ff9c', backgroundColor: 'rgba(0, 255, 156, 0.05)', fill: true, tension: 0.4, pointRadius: 0, borderWidth: 2, shadowColor: '#00ff9c', shadowBlur: 10 }] },
                options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { display: false } },
                    scales: { x: { grid: { display: false }, ticks: { color: '#00ff9c', maxRotation: 0, autoSkip: true, maxTicksLimit: 6, font: { size: 9 } } }, y: { beginAtZero: true, grid: { display: false }, ticks: { color: '#00ff9c', font: { size: 10 } } } }
                },
                plugins: [{
                    beforeDatasetsDraw: (chart) => { const ctx = chart.ctx; const dataset = chart.data.datasets[0]; ctx.shadowColor = dataset.shadowColor; ctx.shadowBlur = dataset.shadowBlur; },
                    afterDatasetsDraw: (chart) => { chart.ctx.shadowBlur = 0; }
                }, oscilloscopePlugin]
            });
        }

        (async function start() {
            applyLang(); updateClock(); initChart(); renderWatchList(); await updateAllServers(); renderUI();
            setInterval(async () => { if (Date.now() - lastFetchTime > FETCH_INTERVAL) { lastFetchTime = Date.now(); await updateAllServers(); } }, 1000);
            setInterval(renderUI, 1000);
        })();
    </script>
</body>
</html>
